[project]
name = "mmp-training"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "torch>=2.7", "transformers>=4.52", "trl>=0.18", "peft>=0.15",
  "bitsandbytes>=0.45", "datasets>=3.0", "accelerate>=1.6",
  "timm>=1.0", "tokenizers>=0.20", "wandb>=0.17",
  "pycocoevalcap", "pyyaml>=6.0", "pillow>=10.3", "mmp-common",
]

[tool.uv.sources]
mmp-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mmp_training"]
