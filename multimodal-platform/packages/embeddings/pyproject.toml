[project]
name = "mmp-embeddings"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "fastapi>=0.111", "uvicorn[standard]>=0.30", "python-multipart>=0.0.9",
  "torch>=2.7", "transformers>=4.52", "pillow>=10.3",
  "pydantic-settings>=2.3", "prometheus-client>=0.20", "mmp-common",
]

[tool.uv.sources]
mmp-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mmp_embeddings"]
