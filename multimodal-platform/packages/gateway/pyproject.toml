[project]
name = "mmp-gateway"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "fastapi>=0.111",
  "uvicorn[standard]>=0.30",
  "httpx>=0.27",
  "pydantic-settings>=2.3",
  "python-multipart>=0.0.9",
  "slowapi>=0.1.9",
  "prometheus-client>=0.20",
  "qdrant-client>=1.14",
  "mmp-common",
]

[tool.uv.sources]
mmp-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mmp_gateway"]
