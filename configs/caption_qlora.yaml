model_id: Qwen/Qwen3-VL-4B-Instruct
output_dir: artifacts/adapters/caption
seed: 42

quant:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  # LLM tower only — vision layers stay frozen so vLLM can serve the adapter.
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

train:
  epochs: 1
  lr: 1.0e-4
  scheduler: cosine
  warmup_ratio: 0.03
  per_device_batch: 1
  grad_accum: 16
  bf16: true
  gradient_checkpointing: true
  max_seq_len: 1024
  save_steps: 500
  eval_steps: 500

data:
  dataset: coco_karpathy
  subset: 60000
  prompt: "Describe this image in one concise sentence."

wandb:
  project: mmp-caption
