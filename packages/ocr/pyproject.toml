[project]
name = "mmp-ocr"
version = "0.1.0"
requires-python = ">=3.12"
# Own lockfile on purpose: PaddlePaddle and the platform's PyTorch stack
# must not share an environment (docs/adr/004-ocr-model.md).
dependencies = [
  "fastapi>=0.111", "uvicorn[standard]>=0.30", "python-multipart>=0.0.9",
  "paddleocr>=3.0", "paddlepaddle-gpu>=3.0",
  "gliner>=0.2", "pypdfium2>=4.30", "pillow>=10.3", "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mmp_ocr"]
